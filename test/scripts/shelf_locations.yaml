# 货架位置配置文件
# Shelf Locations Configuration
#
# 地图范围: 20m x 20m (从-10到+10)
# 起点(装货区): (-8.0, 0.0)
# 终点(卸货区): (8.0, 0.0)
#
# 货架信息：
# - 南侧货架 (Y=-7): shelf_2_1(-8,-7), shelf_2_2(-5,-7), shelf_2_3(-2,-7)
# - 北侧货架 (Y=+7): shelf_3_1(8,7), shelf_3_2(5,7), shelf_3_3(2,7)
# - 货架尺寸: 0.8m x 5m (垂直排列)
# - 取货点设置在货架之间的中点位置，统一使用y=-7

shelves:
  # 南侧取货点1 - shelf_2_1和shelf_2_2之间的中点
  - id: "shelf_01"
    name: "货架01 - 南侧西"
    x: -6.5
    y: -7.0
    yaw: 0.0
    description: "南侧货架1和2之间的取货点"

  # 南侧取货点2 - shelf_2_2和shelf_2_3之间的中点
  - id: "shelf_02"
    name: "货架02 - 南侧中东"
    x: -3.5
    y: -7.0
    yaw: 0.0
    description: "南侧货架2和3之间的取货点"

  # 南侧取货点3 - shelf_2_3右侧的中点
  - id: "shelf_03"
    name: "货架03 - 南侧东"
    x: 0.0
    y: -7.0
    yaw: 0.0
    description: "南侧货架3右侧的取货点（默认）"

  # 南侧取货点4 - shelf_2_3东侧的中点
  - id: "shelf_04"
    name: "货架04 - 南侧东延伸"
    x: 3.5
    y: -7.0
    yaw: 0.0
    description: "南侧更东侧的取货点"

  # 南侧取货点5 - shelf_2_3更东侧的中点
  - id: "shelf_05"
    name: "货架05 - 南侧最东"
    x: 6.5
    y: -7.0
    yaw: 0.0
    description: "南侧最东侧的取货点"
