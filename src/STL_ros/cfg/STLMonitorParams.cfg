#!/usr/bin/env python
# -*- coding: utf-8 -*-

from dynamic_reconfigure.parameter_generator_catkin import *

def generate(gen):
    # ==================== STL Monitor Parameters ====================

    gen.add("prediction_horizon", int_t, 0, "MPC prediction horizon (N)", 20, 5, 100)
    gen.add("time_step", double_t, 0, "Time step for discrete-time dynamics (dt)", 0.1, 0.01, 1.0)

    # ==================== Smooth Robustness Parameters ====================

    gen.add("temperature_tau", double_t, 0, "Temperature parameter for smooth robustness (lower = more accurate, sharper gradients)",
            0.05, 0.001, 1.0)
    gen.add("enable_gradients", bool_t, 0, "Enable gradient computation for MPC optimization", True)

    # ==================== Belief-Space Evaluation Parameters ====================

    gen.add("num_monte_carlo_samples", int_t, 0, "Number of Monte Carlo samples for belief-space evaluation",
            100, 10, 1000)
    gen.add("use_importance_sampling", bool_t, 0, "Use importance sampling for faster evaluation", False)
    gen.add("state_dimension", int_t, 0, "Robot state dimension [x, y, theta, v, w, ...]", 5, 2, 20)

    # ==================== Robustness Budget Parameters ====================

    gen.add("baseline_robustness_r", double_t, 0, "Per-step robustness baseline requirement (r̲)",
            0.1, 0.0, 10.0)
    gen.add("initial_budget", double_t, 0, "Initial robustness budget (R_0)", 0.0, 0.0, 100.0)
    gen.add("max_budget", double_t, 0, "Maximum budget accumulation cap", 10.0, 1.0, 1000.0)
    gen.add("enable_adaptive_budget", bool_t, 0, "Enable adaptive budget adjustment based on satisfaction rate", False)

    # ==================== MPC Integration Parameters ====================

    gen.add("stl_weight_lambda", double_t, 0, "STL objective weight in MPC (λ)",
            1.0, 0.0, 100.0)
    gen.add("budget_constraint_weight", double_t, 0, "Weight for budget constraint penalty",
            10.0, 0.0, 1000.0)
    gen.add("enable_budget_constraints", bool_t, 0, "Enable budget constraints in MPC", True)

    # ==================== Formula Management ====================

    gen.add("formula_file_path", str_t, 0, "Path to YAML file containing STL formulas",
            "")
    gen.add("enable_formula_parsing", bool_t, 0, "Enable real-time formula parsing", True)
    gen.add("formula_validation", bool_t, 0, "Validate formulas before loading", True)

    # ==================== Performance and Debugging ====================

    gen.add("enable_caching", bool_t, 0, "Enable result caching for real-time performance", True)
    gen.add("cache_size", int_t, 0, "Maximum cache size", 10, 1, 100)
    gen.add("enable_profiling", bool_t, 0, "Enable computation time profiling", False)
    gen.add("debug_mode", bool_t, 0, "Enable debug output and sample storage", False)
    gen.add("log_level", int_t, 0, "Log level (0=ERROR, 1=WARN, 2=INFO, 3=DEBUG)",
            2, 0, 3)

    # ==================== Visualization ====================

    gen.add("enable_visualization", bool_t, 0, "Enable visualization topics", True)
    gen.add("publish_timestep_robustness", bool_t, 0, "Publish per-timestep robustness for visualization", True)
    gen.add("publish_samples", bool_t, 0, "Publish Monte Carlo samples (debug mode)", False)
    gen.add("visualization_rate", double_t, 0, "Visualization publish rate (Hz)", 10.0, 1.0, 100.0)

    # ==================== Advanced Parameters ====================

    gen.add("state_noise_std", double_t, 0, "Standard deviation of state noise for belief propagation",
            0.1, 0.0, 10.0)
    gen.add("process_noise_cov", double_t, 0, "Process noise covariance multiplier",
            1.0, 0.0, 100.0)
    gen.add("enable_uncertainty_propagation", bool_t, 0, "Enable full uncertainty propagation in belief evaluation", True)

    return gen
