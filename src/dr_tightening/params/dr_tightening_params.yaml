# DR Tightening Parameters
# Based on Lemma 4.1 (Manuscript Eq. 698)

# Residual Collection
dr_tightening_node:
  sliding_window_size: 200          # M: Window size for residuals (default 200)
  min_residuals_for_update: 50      # Minimum samples before computing margins

# Risk Parameters
  risk_level: 0.1                   # δ: Total violation probability (0.05-0.2)
  risk_allocation: "uniform"        # Strategy: "uniform" or "deadline_weighted"
  confidence_level: 0.95            # Confidence for ambiguity set

# Tube MPC Parameters
  tube_radius: 0.5                  # ē: Tube radius (increased by 0.1 for safety)
  lipschitz_constant: 1.0           # L_h: Safety function Lipschitz constant

# Safety Function Parameters
  safety_buffer: 1.0                # Safety buffer for obstacle avoidance (increased by 0.1)
  obstacle_influence_radius: 5.0    # Radius for obstacle influence

# DR Tightening Options
  ambiguity_strategy: "chebyshev"   # "chebyshev" or "wasserstein_ball"
  cantelli_enabled: true            # Use Cantelli (one-sided Chebyshev) bound

# Update Rate
  update_rate: 10.0                 # DR margin update rate (Hz)

# Output Options
  enable_visualization: true        # Publish RViz markers
  enable_debug_output: false        # Verbose console logging
  log_to_csv: false                 # Log margins to CSV file
  csv_output_path: "/tmp/dr_margins.csv"

# Risk Allocation Options (if deadline_weighted)
  deadline_horizon: 20              # N: MPC horizon for deadline-weighted allocation
  deadline_weight: 1.0              # Weight for deadline steps
