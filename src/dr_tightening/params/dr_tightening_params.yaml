# DR Tightening Parameters
# Based on manuscript Section III: Distributionally Robust Chance Constraints

# Residual collection
residual_window_size: 200        # M: sliding window size (manuscript recommendation)
residual_dimension: 3            # Dimension of disturbance ω

# Risk parameters
total_risk_delta: 0.1            # Overall risk level δ (10% violation probability)
mpc_horizon: 20                  # Prediction horizon N

# Risk allocation strategy
# Options: "uniform", "deadline_weighted", "inverse_square"
risk_allocation_strategy: "uniform"

# Ambiguity set calibration
ambiguity_strategy: "wasserstein_ball"  # or "empirical_gaussian"
confidence_level: 0.95                   # 1-α for coverage guarantee

# Tube parameters
tube_radius: 0.5                  # ē: tube error bound
lipschitz_constant: 1.0          # L_h: for safety function

# Safety function parameters
obstacle_position: [5.0, 5.0]    # Obstacle location
safety_buffer: 1.0               # Buffer zone around obstacles

# Testing
enable_verbose_output: true
log_margins_to_csv: true
csv_output_path: "/tmp/dr_margins.csv"
