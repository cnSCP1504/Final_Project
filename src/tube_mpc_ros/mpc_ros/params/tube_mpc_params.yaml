MPCPlannerROS:
  map_frame: map
  odom_frame: odom
  base_frame: base_footprint
  min_trans_vel: 0.01
  max_vel_x: 0.9
  min_vel_x: -0.1
  max_vel_y: 0.0
  min_vel_y: 0.0
  trans_stopped_vel: 0.01
  max_rot_vel: 2.0
  min_rot_vel: 0.1
  rot_stopped_vel: 0.01
  acc_lim_x: 3.0
  acc_lim_theta: 4.0
  acc_lim_y: 0.0
  yaw_goal_tolerance: 0.5
  xy_goal_tolerance: 0.3
  latch_xy_goal_tolerance: false
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.02
  forward_point_distance: 0.4
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2
  oscillation_reset_dist: 0.05
  publish_traj_pc: true
  publish_cost_grid_pc: true
  debug_info: true
  max_speed: 0.9
  waypoints_dist: -1.0
  path_length: 8.0
  controller_freq: 10
  mpc_steps: 25
  mpc_ref_cte: 0.0
  mpc_ref_vel: 0.7
  mpc_ref_etheta: 0.0
  mpc_w_cte: 50.0
  mpc_w_etheta: 50.0
  mpc_w_vel: 50.0
  mpc_w_angvel: 30.0
  mpc_w_angvel_d: 30.0
  mpc_w_accel: 20.0
  mpc_w_accel_d: 5.0
  mpc_max_angvel: 1.3
  mpc_max_throttle: 1.5
  mpc_bound_value: 1.0e3
  disturbance_bound: 0.15
  enable_adaptive_disturbance: true
  disturbance_window_size: 100
  tube_visualization: true
  error_feedback_gain: 0.6

# ==================== STL Integration Parameters ====================
# Enable STL monitoring and cost modification (Safe-Regret MPC)
enable_stl_integration: false  # Set to true to enable STL feedback

# STL objective weight λ (from manuscript Eq. 7)
# J_k = E[ℓ(x,u)] - λ * ρ^soft(φ; x_{k:k+N})
stl_weight_lambda: 1.0         # STL weight in MPC cost function

# Budget constraint penalty (for constraint violations)
stl_budget_penalty: 10.0       # Penalty weight for budget constraint violations

# STL formula configuration
# These parameters are passed to the STL monitor
stl_temperature_tau: 0.05      # Temperature for smooth robustness
stl_baseline_robustness: 0.1   # Per-step robustness requirement r̲
stl_num_samples: 100           # Monte Carlo samples for belief-space evaluation
