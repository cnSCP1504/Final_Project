MPCPlannerROS:
  map_frame: map
  odom_frame: odom
  base_frame: base_footprint

  # 保守运动参数 - 优先稳定性
  min_trans_vel: 0.01

  max_vel_x: 0.7              # 适中的最大速度: 0.7 m/s
  min_vel_x: -0.05

  max_vel_y: 0.0
  min_vel_y: 0.0

  trans_stopped_vel: 0.01

  max_rot_vel: 1.2            # 适中的旋转速度: 1.2 rad/s
  min_rot_vel: 0.1
  rot_stopped_vel: 0.01

  # 保守的加速度限制
  acc_lim_x: 2.0              # 适中的加速度
  acc_lim_theta: 2.5          # 适中的角加速度
  acc_lim_y: 0.0

  # 目标容差 - 放宽容差
  yaw_goal_tolerance: 0.8
  xy_goal_tolerance: 0.4
  latch_xy_goal_tolerance: false

  # 路径跟踪参数
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.02
  forward_point_distance: 0.35
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

  oscillation_reset_dist: 0.05

  publish_traj_pc: true
  publish_cost_grid_pc: true

  # 调试信息
  debug_info: true
  max_speed: 0.7
  waypoints_dist: -1.0
  path_length: 6.0
  controller_freq: 10

  # === Tube MPC 保守参数 ===

  # MPC预测参数
  mpc_steps: 20               # 标准预测步数
  mpc_ref_cte: 0.0
  mpc_ref_vel: 0.5            # 适中的参考速度: 0.5 m/s
  mpc_ref_etheta: 0.0

  # MPC权重参数 - 平衡性能和稳定性
  mpc_w_cte: 80.0             # 较高的路径跟踪权重
  mpc_w_etheta: 80.0          # 较高的航向权重
  mpc_w_vel: 80.0             # 适中的速度权重
  mpc_w_angvel: 40.0          # 适中的角速度权重
  mpc_w_angvel_d: 40.0
  mpc_w_accel: 40.0           # 适中的加速度权重
  mpc_w_accel_d: 8.0

  # MPC约束参数 - 保守约束
  mpc_max_angvel: 1.0         # 适中的最大角速度: 1.0 rad/s
  mpc_max_throttle: 1.2       # 适中的最大油门: 1.2
  mpc_bound_value: 1.0e3

  # 扰动处理
  disturbance_bound: 0.12     # 适中的扰动边界
  enable_adaptive_disturbance: true
  disturbance_window_size: 100
  tube_visualization: true
  error_feedback_gain: 0.5    # 标准误差反馈增益
