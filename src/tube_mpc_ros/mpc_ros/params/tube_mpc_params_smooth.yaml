MPCPlannerROS:
  global_path_topic: /move_base/MPCPlannerROS/global_plan
  map_frame: map
  odom_frame: odom
  base_frame: base_footprint

  # ========== 速度限制（提升平顺性） ==========
  min_trans_vel: 0.1
  max_vel_x: 1.2           # 降低最大速度：1.5 → 1.2
  min_vel_x: -0.1
  max_vel_y: 0.0
  min_vel_y: 0.0
  trans_stopped_vel: 0.1
  max_rot_vel: 2.0         # 降低最大角速度：2.5 → 2.0
  min_rot_vel: 0.1
  rot_stopped_vel: 0.1

  # ========== 加速度限制（关键！减少抖动） ==========
  acc_lim_x: 2.0           # 降低线加速度：3.0 → 2.0
  acc_lim_theta: 3.0       # 降低角加速度：4.0 → 3.0
  acc_lim_y: 0.0

  # ========== 目标容差（统一半径0.5m） ==========
  yaw_goal_tolerance: 0.5
  xy_goal_tolerance: 0.5  # 统一目标半径: 0.5m
  latch_xy_goal_tolerance: false

  # ========== 路径跟随权重 ==========
  path_distance_bias: 32.0
  goal_distance_bias: 20.0
  occdist_scale: 0.02
  forward_point_distance: 0.4
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2
  oscillation_reset_dist: 0.05

  # ========== 可视化 ==========
  publish_traj_pc: true
  publish_cost_grid_pc: true
  debug_info: true

  # ========== MPC核心参数（优化版） ==========
  max_speed: 0.9           # 降低最大速度：1.0 → 0.9
  waypoints_dist: -1.0
  path_length: 10.0        # 增加路径长度：8.0 → 10.0
  controller_freq: 20      # 提高控制频率：10 → 20（关键！）
  mpc_steps: 25           # 增加预测步数：20 → 25

  # ========== 参考值 ==========
  mpc_ref_cte: 0.0
  mpc_ref_vel: 0.7        # 适中速度：0.8 → 0.7
  mpc_ref_etheta: 0.0

  # ========== 代价函数权重（重点调整） ==========
  mpc_w_cte: 40.0         # 降低横向误差权重：50 → 40
  mpc_w_etheta: 80.0      # 提高航向权重：60 → 80（优先转向）
  mpc_w_vel: 8.0          # 提高速度权重：5 → 8（平稳速度）
  mpc_w_angvel: 40.0      # 提高角速度权重：30 → 40（平滑转向）
  mpc_w_angvel_d: 40.0    # 提高角速度变化权重：30 → 40
  mpc_w_accel: 15.0       # 提高加速度权重：10 → 15（减少急加速）
  mpc_w_accel_d: 10.0     # 提高加速度变化权重：5 → 10（关键！平滑）

  # ========== 控制约束 ==========
  mpc_max_angvel: 1.8     # 适度降低：2.0 → 1.8
  mpc_max_throttle: 8.0   # 降低throttle：10.0 → 8.0
  mpc_bound_value: 1.0e3

  # ========== 扰动与管控制 ==========
  disturbance_bound: 0.12 # 降低扰动估计：0.15 → 0.12
  enable_adaptive_disturbance: true
  disturbance_window_size: 100
  tube_visualization: true
  error_feedback_gain: 0.5  # 降低反馈增益：0.6 → 0.5（更平滑）
