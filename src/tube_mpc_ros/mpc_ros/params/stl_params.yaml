# STL Monitor Parameters
# Based on Safe-Regret MPC manuscript

# Smooth robustness parameters
temperature: 0.1              # τ for log-sum-exp approximation (Remark 3.2)
use_belief_space: true        # Enable belief-space robustness E[ρ^soft]
num_particles: 100            # Number of particles for Monte Carlo
prediction_horizon: 2.0       # Prediction horizon (seconds)
prediction_dt: 0.1            # Prediction time step

# Robustness budget (Eq. 15)
baseline_requirement: 0.1     # r̲: Per-step robustness requirement
initial_budget: 1.0           # R_0
budget_decay_rate: 0.0        # Decay rate (0.0 = disabled)

# STL specification
stl_formula_type: "reachability"
reachability_threshold: 0.5
safety_threshold: 0.5

# Uncertainty
uncertainty_penalty: 0.5
belief_covariance_scale: 1.0

# MPC integration
stl_weight: 10.0              # λ: STL weight in objective
enable_stl_constraints: true

# Performance
update_frequency: 10.0         # Hz
log_enabled: true
log_file: "/tmp/stl_monitor_data.csv"
log_frequency: 10
